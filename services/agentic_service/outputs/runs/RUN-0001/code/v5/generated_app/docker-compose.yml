version: '3.8'

services:
  backend:
    image: node:14
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "9000:9000"
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongodb:27017/autoforge

  frontend:
    image: node:14
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - REACT_APP_API_URL=http://backend:9000
    depends_on:
      - backend

  mongodb:
    image: mongo:4.4
    volumes:
      - ./data/db:/data/db
    ports:
      - "27017:27017"