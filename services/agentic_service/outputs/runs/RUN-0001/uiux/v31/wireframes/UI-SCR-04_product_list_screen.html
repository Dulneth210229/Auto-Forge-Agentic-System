<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product List</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Product List</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Product Card 1 -->
            <div class="bg-white rounded-lg shadow-md overflow-hidden">
                <img src="https://via.placeholder.com/300" alt="Product" class="w-full h-48 object-cover">
                <div class="p-4">
                    <h2 class="text-xl font-semibold text-gray-800">Product Name 1</h2>
                    <p class="text-gray-600 mt-2">Description of the product goes here.</p>
                    <div class="mt-4 flex justify-between items-center">
                        <span class="text-lg font-bold text-gray-800">$29.99</span>
                        <button class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-md transition duration-200">Add to Cart</button>
                    </div>
                </div>
            </div>
            
            <!-- Product Card 2 -->
            <div class="bg-white rounded-lg shadow-md overflow-hidden">
                <img src="https://via.placeholder.com/300" alt="Product" class="w-full h-48 object-cover">
                <div class="p-4">
                    <h2 class="text-xl font-semibold text-gray-800">Product Name 2</h2>
                    <p class="text-gray-600 mt-2">Description of the product goes here.</p>
                    <div class="mt-4 flex justify-between items-center">
                        <span class="text-lg font-bold text-gray-800">$39.99</span>
                        <button class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-md transition duration-200">Add to Cart</button>
                    </div>
                </div>
            </div>
            
            <!-- Product Card 3 -->
            <div class="bg-white rounded-lg shadow-md overflow-hidden">
                <img src="https://via.placeholder.com/300" alt="Product" class="w-full h-48 object-cover">
                <div class="p-4">
                    <h2 class="text-xl font-semibold text-gray-800">Product Name 3</h2>
                    <p class="text-gray-600 mt-2">Description of the product goes here.</p>
                    <div class="mt-4 flex justify-between items-center">
                        <span class="text-lg font-bold text-gray-800">$49.99</span>
                        <button class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-md transition duration-200">Add to Cart</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
